<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>샘플 페이지</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        line-height: 1.6;
      }
      h1 {
        color: #2c3e50;
      }
      .box {
        border: 1px solid #ddd;
        padding: 20px;
        border-radius: 8px;
        background: #f9f9f9;
      }
    </style>
  </head>
  <body>
    <h1>환영합니다!</h1>
    <div class="box">
      <p>이 파일은 샘플 HTML 페이지입니다.</p>
      <p>브라우저에서 열어 확인할 수 있습니다.</p>
    </div>
  </body>
</html>
